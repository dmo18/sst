name: Update status

on:
  schedule:
    # Avoid minute 0 because GitHub Actions schedules are busiest near the top of each hour.
    - cron: "3,8,13,18,23,28,33,38,43,48,53,58 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch provider status feeds
        run: npm run update-status

      - name: Commit updated status.json
        run: |
          git config user.name "msp-status-bot"
          git config user.email "msp-status-bot@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "Update status data"
          git push
