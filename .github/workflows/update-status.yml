name: Update status

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-status
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch provider status feeds
        run: node scripts/fetch-status.js

      - name: Commit updated status.json
        run: |
          git config user.name "msp-status-bot"
          git config user.email "msp-status-bot@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "Update status data"
          git push
