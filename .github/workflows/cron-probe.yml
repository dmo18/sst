name: Cron probe

on:
  schedule:
    # Temporary high-frequency schedule for testing.
    - cron: "* * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cron-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Print cron proof
        run: |
          echo "workflow=${{ github.workflow }}"
          echo "event_name=${{ github.event_name }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_attempt=${{ github.run_attempt }}"
          echo "sha=${{ github.sha }}"
          date -u +"utc=%Y-%m-%dT%H:%M:%SZ"
