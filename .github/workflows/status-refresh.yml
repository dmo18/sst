name: Status refresh

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/status-refresh.yml
      - scripts/fetch-status.js
      - config/providers.json
      - package.json
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: status-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch provider status feeds
        run: npm run update-status

      - name: Write updater heartbeat
        run: |
          node -e "const fs=require('fs'); const data={generated_at:new Date().toISOString(), workflow:process.env.GITHUB_WORKFLOW, event_name:process.env.GITHUB_EVENT_NAME, run_id:process.env.GITHUB_RUN_ID, run_number:process.env.GITHUB_RUN_NUMBER, ref:process.env.GITHUB_REF, sha:process.env.GITHUB_SHA}; fs.writeFileSync('heartbeat.json', JSON.stringify(data,null,2)+'\n');"

      - name: Commit updated status data
        run: |
          git config user.name "msp-status-bot"
          git config user.email "msp-status-bot@users.noreply.github.com"
          git add status.json heartbeat.json
          git diff --cached --quiet || git commit -m "Update status data"
          git push
