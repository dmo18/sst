name: Status refresh

on:
  schedule:
    - cron: "2,7,12,17,22,27,32,37,42,47,52,57 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: status-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Show trigger
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          date -u

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch provider status feeds
        run: npm run update-status

      - name: Commit updated status.json
        run: |
          git config user.name "msp-status-bot"
          git config user.email "msp-status-bot@users.noreply.github.com"
          git add status.json
          git diff --cached --quiet || git commit -m "Update status data"
          git push
