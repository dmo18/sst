name: Minute loop probe

on:
  workflow_dispatch:
    inputs:
      minutes:
        description: "How many one-minute probes to run"
        required: true
        default: "10"
      seconds_between_probes:
        description: "Seconds between probes"
        required: true
        default: "60"

permissions:
  contents: read

concurrency:
  group: minute-loop-probe
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          minutes="${{ github.event.inputs.minutes }}"
          seconds="${{ github.event.inputs.seconds_between_probes }}"

          if ! [[ "$minutes" =~ ^[0-9]+$ ]]; then
            echo "minutes must be a positive integer"
            exit 1
          fi

          if ! [[ "$seconds" =~ ^[0-9]+$ ]]; then
            echo "seconds_between_probes must be a positive integer"
            exit 1
          fi

          if [ "$minutes" -lt 1 ] || [ "$minutes" -gt 60 ]; then
            echo "minutes must be between 1 and 60"
            exit 1
          fi

          if [ "$seconds" -lt 10 ] || [ "$seconds" -gt 300 ]; then
            echo "seconds_between_probes must be between 10 and 300"
            exit 1
          fi

      - name: Probe once per interval
        shell: bash
        run: |
          minutes="${{ github.event.inputs.minutes }}"
          seconds="${{ github.event.inputs.seconds_between_probes }}"

          echo "workflow=${{ github.workflow }}"
          echo "event_name=${{ github.event_name }}"
          echo "run_id=${{ github.run_id }}"
          echo "run_attempt=${{ github.run_attempt }}"
          echo "sha=${{ github.sha }}"
          echo "minutes=$minutes"
          echo "seconds_between_probes=$seconds"

          for i in $(seq 1 "$minutes"); do
            echo "probe=$i/$minutes"
            date -u +"utc=%Y-%m-%dT%H:%M:%SZ"

            if [ "$i" -lt "$minutes" ]; then
              sleep "$seconds"
            fi
          done
