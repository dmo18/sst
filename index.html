<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MSP Status HUD</title>
<style>
:root{color-scheme:dark;--bg:#070a11;--panel:#0d1420;--panel2:#111a29;--line:#223048;--line2:#172236;--text:#f8fafc;--muted:#94a3b8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#38bdf8}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#02040a;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}body{display:grid;place-items:center;padding:24px}.wrap{width:min(100%,960px)}.label{margin:0 0 10px 2px;color:var(--muted);font-size:13px}.slot{width:458px;height:291px;max-width:100%;border:1px solid #344155;border-radius:9px;overflow:hidden;background:var(--bg);box-shadow:0 16px 50px rgba(0,0,0,.65)}.hud{height:100%;display:grid;grid-template-rows:31px 43px 187px 28px;background:linear-gradient(180deg,#0b1220,#06090f)}.top{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;background:#0b111c;border-bottom:1px solid var(--line2)}.brand{font-size:12px;font-weight:900;letter-spacing:.14em;text-transform:uppercase}.summary-pill{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:850;color:#dbeafe;min-width:58px;justify-content:center}.stamp{font-size:10px;color:var(--muted);white-space:nowrap}.providers{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:6px 8px;background:#090e17;border-bottom:1px solid var(--line2)}.provider{position:relative;display:grid;place-items:center;background:#0f1724;border:1px solid #24324a;border-radius:7px;overflow:hidden;min-width:0}.provider:after{content:"";position:absolute;left:0;right:0;bottom:0;height:3px;background:var(--green)}.provider.amber:after{background:var(--amber)}.provider.red:after{background:var(--red)}.provider.blue:after{background:var(--blue)}.provider.amber{border-color:rgba(245,158,11,.78);background:rgba(120,53,15,.22)}.provider.red{border-color:rgba(239,68,68,.78);background:rgba(127,29,29,.25)}.logo{display:block;width:48px;height:24px;object-fit:contain}.content{padding:7px 8px;min-height:0}.incidents{height:100%;display:grid;gap:6px;min-height:0}.incidents.one{grid-template-rows:1fr}.incidents.two{grid-template-rows:1.2fr 1fr}.incidents.three{grid-template-rows:1fr 45px 45px}.incident{min-height:0;overflow:hidden;border:1px solid #24324a;border-left:4px solid var(--blue);border-radius:8px;background:var(--panel2)}.incident.amber{border-left-color:var(--amber)}.incident.red{border-left-color:var(--red)}.hero{display:grid;grid-template-columns:48px 1fr;gap:8px;padding:7px 8px}.hero .logo{width:42px;height:42px;align-self:center}.row{display:grid;grid-template-columns:34px 1fr;gap:7px;padding:6px}.row .logo{width:28px;height:28px;align-self:center}.copy{min-width:0}.meta{display:flex;align-items:center;gap:7px;margin-bottom:2px;font-size:10px;color:var(--muted);white-space:nowrap;min-width:0}.provider-name{font-weight:900;color:#f8fafc}.source{overflow:hidden;text-overflow:ellipsis}.time{margin-left:auto;color:#7f8da3}.title{font-size:13px;font-weight:900;line-height:1.12;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff}.note{margin-top:2px;color:#cbd5e1;font-size:10.8px;line-height:1.2;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:3;overflow:hidden}.row .meta{display:none}.row .title{font-size:11.2px}.row .note{font-size:10px;-webkit-line-clamp:1}.allclear{height:100%;display:grid;place-items:center;text-align:center;border:1px solid rgba(34,197,94,.35);background:rgba(22,101,52,.14);border-radius:8px;color:#dcfce7}.allclear b{display:block;font-size:20px}.allclear span{display:block;margin-top:4px;font-size:11px;color:#bbf7d0}.ticker{display:flex;align-items:center;overflow:hidden;background:#090e17;border-top:1px solid var(--line2);padding:0 9px}.ticker span{font-size:10px;color:#cbd5e1;white-space:nowrap;animation:ticker 32s linear infinite;padding-left:100%}.ticker b{font-weight:850;color:#fff}.dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block;flex:0 0 auto}.dot.amber{background:var(--amber)}.dot.red{background:var(--red)}.dot.blue{background:var(--blue)}.after{max-width:850px;color:#94a3b8;font-size:13px;line-height:1.45;margin-top:14px}.legend{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}.mini{border:1px solid var(--line);border-radius:10px;padding:8px;background:#0b1220;font-size:12px;color:#cbd5e1}.mini-head{display:flex;align-items:center;gap:9px}.mini .logo{width:40px;height:24px}.mini b{display:block;color:#fff}.mini small{display:block;margin-top:5px;word-break:break-word;color:#94a3b8}.green{color:var(--green)}.amber{color:var(--amber)}.red{color:var(--red)}.blue{color:var(--blue)}@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-100%)}}@media(max-width:520px){body{padding:12px}.slot{width:100%;height:291px}}
</style>
</head>
<body>
<main class="wrap">
<p class="label">MSP status HUD. GitHub Actions updates status.json every 5 minutes.</p>
<section class="slot"><div class="hud"><header class="top"><div class="brand">MSP Cloud Alerts</div><div class="summary-pill" id="summaryPill"><span class="dot blue"></span>loading</div><div class="stamp" id="updated">Loading</div></header><div class="providers" id="providers"></div><section class="content"><div class="incidents" id="queue"></div></section><div class="ticker"><span id="ticker">Loading status.json...</span></div></div></section>
<p class="after">Internal development build. Logo assets are local SVG files in assets/logos. The browser reads only the generated local status.json file.</p>
<div class="legend" id="legend"></div>
</main>
<script>
const priorityProviders=['Microsoft 365','Entra ID','Cloudflare','AWS','Google Workspace','OpenAI'];
const logos={microsoft365:'microsoft365.svg',entra:'entra.svg',aws:'aws.svg',cloudflare:'cloudflare.svg','google-workspace':'google-workspace.svg','google-cloud':'google-cloud.svg',openai:'openai.svg',anthropic:'anthropic.svg',slack:'slack.svg',zoom:'zoom.svg'};
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function logo(id,name){const file=logos[id]||'provider.svg';return `<img class="logo" src="assets/logos/${esc(file)}" alt="${esc(name||id||'Provider')}">`}
function shortGenerated(value){if(!value)return 'unknown';const d=new Date(value);if(Number.isNaN(d.getTime()))return value;return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});}
function renderIncident(i,hero){return `<article class="incident ${hero?'hero':'row'} ${esc(i.color||'blue')}">${logo(i.providerId,i.provider)}<div class="copy"><div class="meta"><span class="provider-name">${esc(i.provider)}</span><span class="source">${esc(i.source)}</span><span class="time">${esc(i.time)}</span></div><div class="title">${esc(i.title)}</div><div class="note">${esc(i.note)}</div></div></article>`}
function render(data){
 const providers=data.providers||[];
 const first=priorityProviders.map(n=>providers.find(p=>p.name===n)).filter(Boolean);
 document.getElementById('providers').innerHTML=first.map(p=>`<div class="provider ${esc(p.color||'blue')}" title="${esc(p.name+': '+p.status)}">${logo(p.id,p.name)}</div>`).join('');
 const incidents=(data.incidents||[]).slice(0,3);
 const q=document.getElementById('queue');
 q.className='incidents '+(incidents.length===1?'one':incidents.length===2?'two':'three');
 q.innerHTML=incidents.length?incidents.map((i,idx)=>renderIncident(i,idx===0)).join(''):`<div class="allclear"><div><b>All clear</b><span>No active monitored incidents</span></div></div>`;
 const count=(data.summary&&data.summary.active_incident_count)||incidents.length;
 const overall=(data.summary&&data.summary.overall)||'blue';
 document.getElementById('summaryPill').innerHTML=`<span class="dot ${esc(overall)}"></span>${count} active`;
 document.getElementById('updated').textContent='Updated '+shortGenerated(data.generated_at);
 const items=(data.history&&data.history.length?data.history:['No active incidents across readable feeds']);
 const tick=items.map(x=>`<b>${esc(x)}</b>`).join(' | ');
 document.getElementById('ticker').innerHTML=tick+' | '+tick;
 document.getElementById('legend').innerHTML=providers.map(p=>`<div class="mini"><div class="mini-head">${logo(p.id,p.name)}<div><b>${esc(p.name)}</b><span class="${esc(p.color)}">${esc(p.status)}</span></div></div><small>${esc(p.message||'')}${p.message?'<br>':''}${esc(p.source)}</small></div>`).join('');
}
async function load(){try{const r=await fetch('status.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);render(await r.json());}catch(e){document.getElementById('updated').textContent='status.json failed';document.getElementById('queue').innerHTML=`<article class="incident hero red"><div></div><div class="copy"><div class="title">Could not load status.json</div><div class="note">${esc(e.message||e)}</div></div></article>`}}
load();setInterval(load,60000);
</script>
</body>
</html>
