<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MSP Status HUD</title>
<style>
:root{color-scheme:dark;--bg:#070a0f;--card:#0e1420;--card2:#111827;--line:#253044;--line2:#1a2333;--text:#f8fafc;--muted:#94a3b8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--blue:#38bdf8}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#05070b;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif}body{display:grid;place-items:center;padding:24px}.wrap{width:min(100%,960px)}.label{margin:0 0 10px 2px;color:var(--muted);font-size:13px}.slot{width:458px;height:291px;max-width:100%;border:1px solid #374151;border-radius:10px;overflow:hidden;background:var(--bg);box-shadow:0 22px 70px rgba(0,0,0,.45)}.hud{height:100%;display:grid;grid-template-rows:30px 58px 169px 24px;gap:0;background:linear-gradient(180deg,#0b1220,#06090f)}.top{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid var(--line2);background:#0a101b}.brand{display:flex;align-items:center;gap:8px}.brand-dot{width:8px;height:8px;border-radius:99px;background:var(--green);box-shadow:0 0 10px var(--green)}.title{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}.updated{font-size:10px;color:var(--muted);white-space:nowrap}.providers{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;padding:7px 8px;border-bottom:1px solid var(--line2)}.provider{min-width:0;border:1px solid var(--line);border-radius:8px;background:var(--card);padding:5px 4px;display:grid;grid-template-rows:25px 13px;place-items:center;gap:3px}.provider.issue.red{border-color:rgba(239,68,68,.75);background:rgba(127,29,29,.28)}.provider.issue.amber{border-color:rgba(245,158,11,.75);background:rgba(120,53,15,.25)}.logo{display:block;width:42px;height:25px;object-fit:contain}.note .logo{width:28px;height:28px}.provider-state{display:flex;align-items:center;gap:4px;max-width:100%;font-size:8.8px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.provider-state span:last-child{overflow:hidden;text-overflow:ellipsis}.dot{width:6px;height:6px;border-radius:99px;flex:0 0 auto}.green{color:var(--green)}.amber{color:var(--amber)}.red{color:var(--red)}.blue{color:var(--blue)}.dot.green{background:var(--green)}.dot.amber{background:var(--amber)}.dot.red{background:var(--red)}.dot.blue{background:var(--blue)}.notes{padding:8px;display:grid;grid-template-rows:18px 1fr;gap:6px;min-height:0}.notes-head{display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:850;letter-spacing:.03em;text-transform:uppercase;color:#dbeafe}.notes-head span:last-child{font-size:9.5px;color:var(--muted);font-weight:700}.queue{display:grid;gap:6px;min-height:0}.queue.one{grid-template-rows:1fr}.queue.two{grid-template-rows:1fr 1fr}.queue.three{grid-template-rows:1fr 1fr 1fr}.note{position:relative;display:grid;grid-template-columns:34px 1fr;gap:7px;border:1px solid var(--line);border-left-width:4px;border-radius:9px;background:var(--card2);padding:6px 7px;min-height:0;overflow:hidden}.note.red{border-left-color:var(--red)}.note.amber{border-left-color:var(--amber)}.note.blue{border-left-color:var(--blue)}.note-body-wrap{min-width:0}.meta{display:flex;align-items:center;gap:6px;margin-bottom:2px;font-size:9.5px;color:var(--muted);white-space:nowrap}.badge{font-weight:800;color:#e5e7eb}.time{margin-left:auto}.note-title{font-size:11.3px;line-height:1.1;font-weight:850;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.note-body{margin-top:1px;color:#cbd5e1;font-size:10.1px;line-height:1.18;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}.empty{height:100%;display:grid;place-items:center;text-align:center;border:1px solid rgba(34,197,94,.35);border-radius:9px;background:rgba(22,101,52,.18);color:#dcfce7;font-size:13px;font-weight:850}.ticker{display:flex;align-items:center;overflow:hidden;border-top:1px solid var(--line2);background:#070b12}.ticker span{white-space:nowrap;font-size:10px;color:#cbd5e1;animation:ticker 34s linear infinite;padding-left:100%}.ticker b{font-weight:850;color:#fff}.after{max-width:850px;color:#94a3b8;font-size:13px;line-height:1.45;margin-top:14px}.legend{margin-top:10px;display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:8px}.mini{border:1px solid var(--line);border-radius:10px;padding:8px;background:#0b1220;font-size:12px;color:#cbd5e1}.mini-head{display:flex;align-items:center;gap:9px}.mini .logo{width:40px;height:24px}.mini b{display:block;color:#fff}.mini small{display:block;margin-top:5px;word-break:break-word;color:#94a3b8}@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-100%)}}@media(max-width:520px){body{padding:12px}.slot{width:100%;height:291px}}
</style>
</head>
<body>
<main class="wrap">
<p class="label">MSP status HUD. GitHub Actions updates status.json every 5 minutes.</p>
<section class="slot"><div class="hud"><header class="top"><div class="brand"><span class="brand-dot"></span><div class="title">MSP Cloud Alerts</div></div><div class="updated" id="updated">Loading</div></header><div class="providers" id="providers"></div><section class="notes"><div class="notes-head"><div>Active incidents only</div><span id="feedCount">loading</span></div><div class="queue" id="queue"></div></section><div class="ticker"><span id="ticker">Loading status.json...</span></div></div></section>
<p class="after">Internal development build. Logo assets are local SVG files in assets/logos. The browser still reads only the generated local status.json file.</p>
<div class="legend" id="legend"></div>
</main>
<script>
const priorityProviders=['Microsoft 365','Entra ID','Cloudflare','AWS','Google Workspace','OpenAI'];
const logos={microsoft365:'microsoft365.svg',entra:'entra.svg',aws:'aws.svg',cloudflare:'cloudflare.svg','google-workspace':'google-workspace.svg','google-cloud':'google-cloud.svg',openai:'openai.svg',anthropic:'anthropic.svg',slack:'slack.svg',zoom:'zoom.svg'};
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function dot(c){return `<span class="dot ${esc(c||'blue')}"></span>`}
function logo(id,name){const file=logos[id]||'provider.svg';return `<img class="logo" src="assets/logos/${esc(file)}" alt="${esc(name||id||'Provider')}">`}
function shortGenerated(value){if(!value)return 'unknown';const d=new Date(value);if(Number.isNaN(d.getTime()))return value;return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});}
function activeProviderText(p){if(p.color==='green')return 'OK';if(p.color==='blue')return 'Limited';return p.status||'Issue'}
function render(data){
 const providers=data.providers||[];
 const first=priorityProviders.map(n=>providers.find(p=>p.name===n)).filter(Boolean);
 document.getElementById('providers').innerHTML=first.map(p=>`<div class="provider ${p.color==='red'||p.color==='amber'?'issue '+esc(p.color):''}" title="${esc(p.name+': '+p.status)}">${logo(p.id,p.name)}<div class="provider-state ${esc(p.color)}">${dot(p.color)}<span>${esc(activeProviderText(p))}</span></div></div>`).join('');
 const incidents=(data.incidents||[]).slice(0,3);
 const q=document.getElementById('queue');
 q.className='queue '+(incidents.length===1?'one':incidents.length===2?'two':'three');
 q.innerHTML=incidents.length?incidents.map(i=>`<article class="note ${esc(i.color)}">${logo(i.providerId,i.provider)}<div class="note-body-wrap"><div class="meta"><span class="badge">${esc(i.provider)}</span><span>${esc(i.source)}</span><span class="time">${esc(i.time)}</span></div><div class="note-title">${esc(i.title)}</div><div class="note-body">${esc(i.note)}</div></div></article>`).join(''):`<div class="empty">All active monitored incidents are clear</div>`;
 const ok=(data.summary&&data.summary.providers_ok)||0,total=(data.summary&&data.summary.providers_total)||providers.length;
 document.getElementById('feedCount').textContent=`${ok}/${total} sources`;
 document.getElementById('updated').textContent='Updated '+shortGenerated(data.generated_at);
 const items=(data.history&&data.history.length?data.history:['No active incidents across readable feeds']);
 const tick=items.map(x=>`<b>${esc(x)}</b>`).join(' | ');
 document.getElementById('ticker').innerHTML=tick+' | '+tick;
 document.getElementById('legend').innerHTML=providers.map(p=>`<div class="mini"><div class="mini-head">${logo(p.id,p.name)}<div><b>${esc(p.name)}</b><span class="${esc(p.color)}">${esc(p.status)}</span></div></div><small>${esc(p.message||'')}${p.message?'<br>':''}${esc(p.source)}</small></div>`).join('');
}
async function load(){try{const r=await fetch('status.json?ts='+Date.now(),{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);render(await r.json());}catch(e){document.getElementById('updated').textContent='status.json failed';document.getElementById('queue').innerHTML=`<article class="note red"><div></div><div><div class="note-title">Could not load status.json</div><div class="note-body">${esc(e.message||e)}</div></div></article>`}}
load();setInterval(load,60000);
</script>
</body>
</html>
